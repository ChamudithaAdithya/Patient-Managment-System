name: CI/CD — Build & Deploy to AWS
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  DOCKER_HUB_REPO: chamudithaadithya/patient_management_system
  AWS_REGION: ap-southeast-1
  FRONTEND_BUCKET: hospital-frontend-dev-2026

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build all backend microservices
  # ──────────────────────────────────────────────
  build-backend:
    name: Build Java services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - patient-service
          - billing-service
          - analytics-service
          - api-getway
          - appoinment-service-main
          - imaging-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.service }}
          path: ./${{ matrix.service }}/target/*.jar

  # ──────────────────────────────────────────────
  # JOB 2: Build & push Docker images
  # ──────────────────────────────────────────────
  docker-build:
    name: Build & push Docker images
    needs: build-backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth-service
            dockerfile: ./auth-service/Dockerfile
            tag: auth_service
          - name: patient-service
            dockerfile: ./patient-service/Dockerfile
            tag: patient
          - name: billing-service
            dockerfile: ./billing-service/Dockerfile
            tag: billing
          - name: analytics-service
            dockerfile: ./analytics-service/Dockerfile
            tag: analytics
          - name: api-getway
            dockerfile: ./api-getway/Dockerfile
            tag: api_getway
          - name: appoinment-service-main
            dockerfile: ./appoinment-service-main/Dockerfile
            tag: appointment
          - name: imaging-service
            dockerfile: ./imaging-service/Dockerfile
            tag: imaging
          - name: frontend
            dockerfile: ./frontend/Dockerfile
            tag: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        if: matrix.service.name != 'frontend'
        uses: actions/download-artifact@v4
        with:
          name: jar-${{ matrix.service.name }}
          path: ./${{ matrix.service.name }}/target/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          push: true
          tags: ${{ env.DOCKER_HUB_REPO }}:${{ matrix.service.tag }}

  # ──────────────────────────────────────────────
  # JOB 3: Build frontend
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - run: npm ci
      - name: Build frontend (with production API URLs)
        run: VITE_API_GATEWAY=http://pm-alb-2089108845.ap-southeast-1.elb.amazonaws.com npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist

  # ──────────────────────────────────────────────
  # JOB 4: Deploy frontend to S3 + CloudFront
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to S3
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure S3 for SPA routing
        run: aws s3 website s3://${{ env.FRONTEND_BUCKET }} --index-document index.html --error-document index.html

      - name: Sync to S3
        run: aws s3 sync ./dist s3://${{ env.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront (skip if no distribution)
        run: |
          CF_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[?DomainName=='${{ env.FRONTEND_BUCKET }}.s3.amazonaws.com']].Id" --output text 2>/dev/null || true)
          if [ -n "$CF_ID" ] && [ "$CF_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id $CF_ID --paths "/*"
          else
            echo "No CloudFront distribution found — skipping invalidation"
          fi

  # ──────────────────────────────────────────────
  # JOB 5: Deploy backend to EC2
  # ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to EC2
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/patient-managment
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
