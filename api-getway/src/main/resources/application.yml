server:
  port: 4004

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://hospital-frontend-dev-2026.s3-website.ap-southeast-1.amazonaws.com"
              - "http://localhost:5173"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers:
              - Authorization
              - Content-Type
              - Accept
            allow-credentials: true
      routes:
        ### REST CLIENT -> http://localhost:4004/api/patients
        ### API GATEWAY -> http://patient-service:4000/patients
        ### PATIENT SERVICE (SPRING BOOT APP) -> /patients -> Patients Array
        - id: patient-service-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1

        ### REST-CLIENT -> http://localhost:4004/api-docs/patients
        ### API-GATEWAY -> http://patient-service:4000/v3/api-docs
        - id: api-docs-patient-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api-docs/patients
          filters:
            - RewritePath=/api-docs/patients, v3/api-docs

        ### REST-CLIENT -> http://localhost:4004/api/doctors
        ### API-GATEWAY -> http://appointment-service:4006/doctors
        - id: doctor-service-route
          uri: http://appointment-service:4006
          predicates:
            - Path=/api/doctors/**
          filters:
            - StripPrefix=1

        ### REST-CLIENT -> http://localhost:4004/api/appointments
        ### API-GATEWAY -> http://appointment-service:4006/appointments
        - id: appointment-service-route
          uri: http://appointment-service:4006
          predicates:
            - Path=/api/appointments/**
          filters:
            - StripPrefix=1

        - id: consultation-service-route
          uri: http://appointment-service:4006
          predicates:
            - Path=/api/consultations/**
          filters:
            - StripPrefix=1

        - id: imaging-service-route
          uri: http://imaging-service:4007
          predicates:
            - Path=/api/images/**
          filters:
            - StripPrefix=1

        - id: api-docs-appointment-route
          uri: http://appointment-service:4006
          predicates:
            - Path=/api-docs/appointments
          filters:
            - RewritePath=/api-docs/appointments, v3/api-docs

        - id: auth-service-route
          uri: http://auth-service:4005
          predicates:
            - Path=/login,/register,/admin/**
