services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: patient-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - internal-net

  patient-kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: patient-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://patient-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - internal-net

  billing-service:
    build:
      context: ./billing-service
      dockerfile: Dockerfile
    container_name: billing-service
    restart: unless-stopped
    image: chamudithaadithya/patient_management_system:billing
    ports:
      - '4001:4001'
      - '9001:9001'
    environment:
      - SERVER_MAX_HTTP_REQUEST_HEADER_SIZE=64KB
    networks:
      - internal-net
      
  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    restart: unless-stopped
    image: chamudithaadithya/patient_management_system:patient
    environment:
      - BILLING_SERVICE_ADDRESS_LOCALHOST=billing-service
      - BILLING_SERVICE_GRPC_PORT=9001
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=patient-kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://pm-postgres.cfyk0wk8c4m1.ap-southeast-1.rds.amazonaws.com:5432/patient_management
      - SPRING_DATASOURCE_USERNAME=pm_admin
      - SPRING_DATASOURCE_PASSWORD=PMSystem2026!
      - SERVER_MAX_HTTP_REQUEST_HEADER_SIZE=64KB
    depends_on:
      - billing-service
    networks:
      - internal-net

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    restart: unless-stopped
    image: chamudithaadithya/patient_management_system:analytics
    ports:
      - 4002:4002
    depends_on:
      - billing-service
      - patient-service
    networks:
      - internal-net
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=patient-kafka:9092
      - SERVER_MAX_HTTP_REQUEST_HEADER_SIZE=64KB

  api-getway:
    build:
      context: ./api-getway
      dockerfile: Dockerfile
    container_name: api-getway
    restart: unless-stopped
    image: chamudithaadithya/patient_management_system:api_getway
    ports:
      - 4004:4004
    networks:
      - internal-net
  
  auth-service:
    build: 
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    image: chamudithaadithya/patient_management_system:auth_service
    ports:
      - 4005:4005
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://pm-postgres.cfyk0wk8c4m1.ap-southeast-1.rds.amazonaws.com:5432/patient_management
      - SPRING_DATASOURCE_USERNAME=pm_admin
      - SPRING_DATASOURCE_PASSWORD=PMSystem2026!
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=patient-kafka:9092
      - SERVER_MAX_HTTP_REQUEST_HEADER_SIZE=64KB
    depends_on:
      - patient-kafka
    networks:
      - internal-net

  appointment-service:
    build:
      context: ./appoinment-service-main
      dockerfile: Dockerfile
    container_name: appointment-service
    restart: unless-stopped
    image: chamudithaadithya/patient_management_system:appointment
    ports:
      - 4006:4006
    depends_on:
      - patient-kafka
    networks:
      - internal-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://pm-postgres.cfyk0wk8c4m1.ap-southeast-1.rds.amazonaws.com:5432/patient_management
      - SPRING_DATASOURCE_USERNAME=pm_admin
      - SPRING_DATASOURCE_PASSWORD=PMSystem2026!
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=patient-kafka:9092
      - SERVER_MAX_HTTP_REQUEST_HEADER_SIZE=64KB

  imaging-service:
    build:
      context: ./imaging-service
      dockerfile: Dockerfile
    container_name: imaging-service
    restart: unless-stopped
    image: chamudithaadithya/patient_management_system:imaging
    ports:
      - "4007:4007"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://pm-postgres.cfyk0wk8c4m1.ap-southeast-1.rds.amazonaws.com:5432/patient_management
      - SPRING_DATASOURCE_USERNAME=pm_admin
      - SPRING_DATASOURCE_PASSWORD=PMSystem2026!
      - SERVER_KAFKA_BOOTSTRAP_SERVERS=patient-kafka:9092
      - SERVER_MAX_HTTP_REQUEST_HEADER_SIZE=64KB
    depends_on:
      - patient-kafka
    networks:
      - internal-net
    volumes:
      - medical-images:/app/images

volumes:
  medical-images:

networks:
  internal-net:
    external: true
